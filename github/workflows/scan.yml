name: EMA Golden Cross Scanner

on:
  schedule:
    # 9:30 AM IST = 04:00 UTC. Sirf Mon-Fri (NSE trading days approx, holidays handle nahi hote)
    - cron: "0 4 * * 1-5"
  workflow_dispatch: {}   # manual "Run workflow" button ke liye (testing me kaam aayega)

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 170   # 9:30 se 12:00 tak (2.5 hr) ke liye safe margin

    steps:
      - name: Repo checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Dependencies install
        run: pip install -r requirements.txt

      - name: Git config (auto-commit ke liye)
        run: |
          git config --global user.name "ema-scanner-bot"
          git config --global user.email "actions@github.com"

      - name: Scanner chalao
        env:
          ANGEL_API_KEY: ${{ secrets.ANGEL_API_KEY }}
          ANGEL_CLIENT_CODE: ${{ secrets.ANGEL_CLIENT_CODE }}
          ANGEL_PASSWORD: ${{ secrets.ANGEL_PASSWORD }}
          ANGEL_TOTP_SECRET: ${{ secrets.ANGEL_TOTP_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main_scan.py
